name: Build K230 Linux SDK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  GCC_FILE: Xuantie-900-gcc-linux-6.6.0-glibc-x86_64-V3.0.2-20250410
  GCC_FILE_MD5: 8cefc7e94f760eaecc3620ffb238bf4a
  DL_SITE: https://kendryte-download.canaan-creative.com/k230/downloads/dl/

jobs:
  build:
    name: Build (${{ matrix.hw_type }}_${{ matrix.hw_model }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - hw_type: k230
            hw_model: canmv
          - hw_type: k230d
            hw_model: canmv

    steps:
      - name: Checkout SDK
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Cache toolchain tarball
        id: cache-tc
        uses: actions/cache@v4
        with:
          path: /tmp/${{ env.GCC_FILE }}.tar.gz
          key: tc-${{ env.GCC_FILE }}-${{ env.GCC_FILE_MD5 }}
          restore-keys: |
            tc-${{ env.GCC_FILE }}-

      - name: Download toolchain (if not cached)
        if: steps.cache-tc.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/toolchain
          wget ${{ env.DL_SITE }}/gcc/${{ env.GCC_FILE }}.tar.gz \
            -O /tmp/${{ env.GCC_FILE }}.tar.gz

      - name: Verify and extract toolchain
        run: |
          echo "${{ env.GCC_FILE_MD5 }}  /tmp/${{ env.GCC_FILE }}.tar.gz" | md5sum -c
          sudo mkdir -p /opt/toolchain
          sudo tar -xf /tmp/${{ env.GCC_FILE }}.tar.gz -C /opt/toolchain
          ls /opt/toolchain/

      - name: Cache buildroot downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildroot-cache/
            sdk/output/**/buildroot-2025.02.1/download/
          key: dl-${{ runner.os }}-${{ matrix.hw_type }}-${{ matrix.hw_model }}
          restore-keys: |
            dl-${{ runner.os }}-${{ matrix.hw_type }}-

      - name: Restore buildroot compilation cache
        id: cache-build
        uses: actions/cache@v4
        with:
          path: |
            sdk/output/${{ matrix.hw_type }}_${{ matrix.hw_model }}_defconfig/
            buildroot-2025.02.1/
            .staging_dir/
            .host_dir/
          key: build-int-${{ runner.os }}-${{ matrix.hw_type }}-${{ matrix.hw_model }}-${{ github.sha }}
          restore-keys: |
            build-int-${{ runner.os }}-${{ matrix.hw_type }}-${{ matrix.hw_model }}-

      - name: Link download cache
        if: steps.cache-tc.outputs.cache-hit == 'true'
        run: |
          mkdir -p sdk/output/${{ matrix.hw_type }}_${{ matrix.hw_model }}_defconfig/buildroot-2025.02.1/
          test -d ~/.buildroot-cache && \
            ln -sf ~/.buildroot-cache sdk/output/${{ matrix.hw_type }}_${{ matrix.hw_model }}_defconfig/buildroot-2025.02.1/download || true

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bc python3 python3-pcpp

      - name: Build SDK
        run: |
          cd sdk
          make CONF=${{ matrix.hw_type }}_${{ matrix.hw_model }}_defconfig \
            BR2_PRIMARY_SITE=${{ env.DL_SITE }}

      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: sdk/output/${{ matrix.hw_type }}_${{ matrix.hw_model }}_defconfig/images/
          key: build-${{ runner.os }}-${{ matrix.hw_type }}-${{ matrix.hw_model }}-${{ github.sha }}
          restore-keys: |
            build-${{ runner.os }}-${{ matrix.hw_type }}-${{ matrix.hw_model }}-

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: k230-img-${{ matrix.hw_type }}-${{ matrix.hw_model }}
          path: sdk/output/${{ matrix.hw_type }}_${{ matrix.hw_model }}_defconfig/images/*.img.gz
          retention-days: 7