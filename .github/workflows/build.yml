name: Build K230 Linux SDK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]

env:
  DL_SITE: https://ai.b-bug.org/k230/downloads/dl/
  CONF: ${{ matrix.hw_type }}_${{ matrix.hw_model }}_defconfig

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.hw_type }}_${{ matrix.hw_model }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        hw_type: [k230, k230d]
        hw_model: [canmv]

    steps:
      - name: Checkout SDK
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Cache buildroot downloads
        uses: actions/cache@v4
        id: cache-dl
        with:
          path: |
            ~/.buildroot-cache/
            sdk/output/**/buildroot-2025.02.1/download/
          key: dl-${{ runner.os }}-${{ matrix.hw_type }}-${{ matrix.hw_model }}
          restore-keys: |
            dl-${{ runner.os }}-${{ matrix.hw_type }}-

      - name: Link download cache
        if: steps.cache-dl.outputs.cache-hit == 'true'
        run: |
          mkdir -p sdk/output/${{ matrix.hw_type }}_${{ matrix.hw_model }}_defconfig/buildroot-2025.02.1/
          ln -sf ~/.buildroot-cache ~/.buildroot-cache-link 2>/dev/null || true
          test -d ~/.buildroot-cache-link/download && \
            ln -sf ~/.buildroot-cache-link/download sdk/output/${{ matrix.hw_type }}_${{ matrix.hw_model }}_defconfig/buildroot-2025.02.1/download

      - name: Install toolchain and dependencies
        run: make toolchain_and_depend

      - name: Build SDK
        run: make CONF=${{ env.CONF }} BR2_PRIMARY_SITE=${{ env.DL_SITE }}

      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: sdk/output/${{ matrix.hw_type }}_${{ matrix.hw_model }}_defconfig/images/
          key: build-${{ runner.os }}-${{ matrix.hw_type }}-${{ matrix.hw_model }}-${{ github.sha }}
          restore-keys: |
            build-${{ runner.os }}-${{ matrix.hw_type }}-${{ matrix.hw_model }}-

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: k230-img-${{ matrix.hw_type }}-${{ matrix.hw_model }}
          path: sdk/output/${{ matrix.hw_type }}_${{ matrix.hw_model }}_defconfig/images/*.img.gz
          retention-days: 7